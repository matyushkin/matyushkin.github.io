<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="index, follow">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Лёва Матюшкин">
  <link href="../style.css" rel="stylesheet">
  <link rel="shortcut icon" href="../img/logo.png" type="image/x-icon">
  <title>Достижения — Лёва Матюшкин</title>

</head>
<body>
  <header>
    <nav>
      <section class="logo">
        <a href="../index.html"><img src="../img/logo.png" alt="Главная страница"></a>
      </section>
      <section><a href="../posts/index.html">Coding</a></section>
      <section><a href="../texts/index.html" id="nav-texts">Тексты</a></section>
      <section><a href="index.html" id="nav-achievements">Достижения</a></section>
      <section><a href="../links/index.html">Ссылки</a></section>
      <select id="lang-select" class="lang-select">
        <option value="ru">RU</option>
        <option value="en">EN</option>
      </select>
    </nav>
  </header>
  <main>
    <h1 id="page-title">Достижения</h1>
    <p id="link-creative"></p>
    <p id="link-science"></p>
  </main>
  <footer>
    <p id="footer-text">Почта — <a href="mailto:leva.matyushkin@gmail.com">leva.matyushkin@gmail.com</a></p>
  </footer>

  <script>
  const UI = {
    ru: {
      pageTitle: 'Достижения',
      creative: '<a href="creative/index.html?lang=ru">Творческие достижения</a> — поэзия, проза, выставки',
      science:  '<a href="science/index.html?lang=ru">Научные достижения</a> — публикации, гранты, конференции',
      navTexts: 'Тексты',
      navAchievements: 'Достижения',
      footer: 'Почта — <a href="mailto:leva.matyushkin@gmail.com">leva.matyushkin@gmail.com</a>'
    },
    en: {
      pageTitle: 'Achievements',
      creative: '<a href="creative/index.html?lang=en">Creative achievements</a> — poetry, prose, exhibitions',
      science:  '<a href="science/index.html?lang=en">Scientific achievements</a> — publications, grants, conferences',
      navTexts: 'Texts',
      navAchievements: 'Achievements',
      footer: 'Email — <a href="mailto:leva.matyushkin@gmail.com">leva.matyushkin@gmail.com</a>'
    }
  };

  function getLang() {
    const urlLang = new URLSearchParams(window.location.search).get('lang');
    if (urlLang) {
      localStorage.setItem('lang', urlLang);
      return urlLang;
    }
    const stored = localStorage.getItem('lang');
    if (stored) return stored;
    const browserLang = (navigator.language || '').slice(0, 2).toLowerCase();
    return browserLang === 'ru' ? 'ru' : 'en';
  }

  function render(lang) {
    const ui = UI[lang] || UI.en;
    document.getElementById('page-title').textContent = ui.pageTitle;
    document.title = ui.pageTitle + ' — Лёва Матюшкин';
    document.getElementById('link-creative').innerHTML = ui.creative;
    document.getElementById('link-science').innerHTML = ui.science;
    document.getElementById('nav-texts').textContent = ui.navTexts;
    document.getElementById('nav-achievements').textContent = ui.navAchievements;
    document.getElementById('footer-text').innerHTML = ui.footer;
  }

  const currentLang = getLang();
  const select = document.getElementById('lang-select');
  select.value = currentLang;
  render(currentLang);

  select.addEventListener('change', () => {
    const lang = select.value;
    localStorage.setItem('lang', lang);
    const url = new URL(window.location);
    url.searchParams.set('lang', lang);
    history.replaceState(null, '', url);
    render(lang);
  });
  </script>
</body>
</html>
