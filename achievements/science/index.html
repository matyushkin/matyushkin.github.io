<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="index, follow">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="../../style.css" rel="stylesheet">
  <link rel="shortcut icon" href="../../img/logo.png" type="image/x-icon">
  <title>Научные достижения — Лёва Матюшкин</title>
  <style>
    .achievement { margin-bottom: 1.8em; }
    .achievement-meta { font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 0.2em; }
    .achievement-title { margin-bottom: 0.15em; }
    .achievement-venue { font-size: 0.9em; }
    .achievement-desc { font-size: 0.85em; margin-top: 0.2em; color: #555; }
    .dark-theme .achievement-desc { color: #aaa; }
    .achievement-links { font-size: 0.8em; margin-top: 0.3em; }
  </style>
</head>
<body>
  <header>
    <nav>
      <section class="logo">
        <a href="../../index.html"><img src="../../img/logo.png" alt="Главная страница"></a>
      </section>
      <section><a href="../../posts/index.html">Coding</a></section>
      <section><a href="../../texts/index.html" id="nav-texts">Тексты</a></section>
      <section><a href="../index.html" id="nav-achievements">Достижения</a></section>
      <section><a href="../../links/index.html">Ссылки</a></section>
      <select id="lang-select" class="lang-select">
        <option value="ru">RU</option>
        <option value="en">EN</option>
      </select>
    </nav>
  </header>
  <main>
    <h1 id="page-title">Научные достижения</h1>
    <div id="achievements-list"></div>
  </main>
  <footer>
    <p id="footer-text">Почта — <a href="mailto:leva.matyushkin@gmail.com">leva.matyushkin@gmail.com</a></p>
  </footer>

  <script>
  const UI = {
    ru: {
      pageTitle: 'Научные достижения',
      types: {
        publication: 'публикация',
        conference: 'конференция',
        award: 'награда',
        grant: 'грант',
        patent: 'патент',
        dissertation: 'диссертация'
      },
      navTexts: 'Тексты',
      navAchievements: 'Достижения',
      footer: 'Почта — <a href="mailto:leva.matyushkin@gmail.com">leva.matyushkin@gmail.com</a>'
    },
    en: {
      pageTitle: 'Scientific Achievements',
      types: {
        publication: 'publication',
        conference: 'conference',
        award: 'award',
        grant: 'grant',
        patent: 'patent',
        dissertation: 'dissertation'
      },
      navTexts: 'Texts',
      navAchievements: 'Achievements',
      footer: 'Email — <a href="mailto:leva.matyushkin@gmail.com">leva.matyushkin@gmail.com</a>'
    }
  };

  function getLang() {
    const urlLang = new URLSearchParams(window.location.search).get('lang');
    if (urlLang) {
      localStorage.setItem('lang', urlLang);
      return urlLang;
    }
    const stored = localStorage.getItem('lang');
    if (stored) return stored;
    const browserLang = (navigator.language || '').slice(0, 2).toLowerCase();
    return browserLang === 'ru' ? 'ru' : 'en';
  }

  function render(achievements, lang) {
    const ui = UI[lang] || UI.ru;

    document.getElementById('page-title').textContent = ui.pageTitle;
    document.title = ui.pageTitle + ' — Лёва Матюшкин';
    document.getElementById('footer-text').innerHTML = ui.footer;
    document.getElementById('nav-texts').textContent = ui.navTexts;
    document.getElementById('nav-achievements').textContent = ui.navAchievements;

    if (achievements.length === 0) {
      document.getElementById('achievements-list').innerHTML = '';
      return;
    }

    const sorted = [...achievements]
      .filter(a => lang === 'ru' || a.lang_of_work !== 'ru')
      .sort((a, b) => b.year - a.year);
    document.getElementById('achievements-list').innerHTML = sorted.map(a => {
      const i = a.i18n[lang] || a.i18n['ru'] || Object.values(a.i18n)[0];
      const typeLabel = ui.types[a.type] || a.type;
      const citationsHtml = a.citations
        ? ` · <span title="citations / цитирований">${a.citations} ✦</span>`
        : '';
      const linkParts = [];
      if (a.urls?.scholar) linkParts.push(`<a href="${a.urls.scholar}" target="_blank" rel="noopener">Scholar</a>`);
      if (a.urls?.researchgate) linkParts.push(`<a href="${a.urls.researchgate}" target="_blank" rel="noopener">ResearchGate</a>`);
      if (a.urls?.researchgate2) linkParts.push(`<a href="${a.urls.researchgate2}" target="_blank" rel="noopener">ResearchGate (2)</a>`);
      if (a.urls?.researchgate_ru) linkParts.push(`<a href="${a.urls.researchgate_ru}" target="_blank" rel="noopener">ResearchGate (рус.)</a>`);
      if (a.urls?.elibrary) linkParts.push(`<a href="${a.urls.elibrary}" target="_blank" rel="noopener">eLIBRARY</a>`);
      if (a.urls?.elibrary_ru) linkParts.push(`<a href="${a.urls.elibrary_ru}" target="_blank" rel="noopener">eLIBRARY (рус.)</a>`);
      const linksHtml = linkParts.length
        ? `<div class="achievement-links">${linkParts.join(' · ')}</div>`
        : '';
      return `<div class="achievement">
        <div class="achievement-meta">${typeLabel} · ${a.year}${citationsHtml}</div>
        <div class="achievement-title">${i.title}</div>
        <div class="achievement-venue">${i.venue}</div>
        ${i.description ? `<div class="achievement-desc">${i.description}</div>` : ''}
        ${linksHtml}
      </div>`;
    }).join('');
  }

  fetch('data.json')
    .then(r => r.json())
    .then(data => {
      const achievements = data.achievements;

      const knownLangs = new Set(Object.keys(UI));
      achievements.forEach(a => Object.keys(a.i18n).forEach(l => knownLangs.add(l)));

      const select = document.getElementById('lang-select');
      const currentLang = getLang();
      select.innerHTML = [...knownLangs].map(l =>
        `<option value="${l}"${l === currentLang ? ' selected' : ''}>${l.toUpperCase()}</option>`
      ).join('');

      function updateNavLang(lang) {
        const navAch = document.getElementById('nav-achievements');
        if (navAch) navAch.href = '../index.html?lang=' + lang;
      }

      render(achievements, currentLang);
      updateNavLang(currentLang);

      select.addEventListener('change', () => {
        const lang = select.value;
        localStorage.setItem('lang', lang);
        const url = new URL(window.location);
        url.searchParams.set('lang', lang);
        history.replaceState(null, '', url);
        render(achievements, lang);
        updateNavLang(lang);
      });
    });
  </script>
</body>
</html>
